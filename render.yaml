services:
  - type: web
    name: churn-calc-ml-service
    runtime: python
    plan: free
    rootDir: ml-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.3
      - key: FRONTEND_ORIGIN
        sync: false
